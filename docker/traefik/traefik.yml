api:
  insecure: true
  dashboard: true
  debug: false

entryPoints:
  http:
    address: ":80"
    http:
      sanitizePath: false
      redirections:
        entrypoint:
          regex: "^http://(.*)$"
          replacement: "https://$1"
          permanent: true

  https:
    address: ":443"
    http:
      sanitizePath: false
      tls:
        options: default

providers:
  docker:
    endpoint: "unix:///var/run/docker.sock"
    exposedByDefault: false
    network: traefik-network
    swarmMode: false

  file:
    filename: /config.yml
    watch: true

certificatesResolvers:
  letsencrypt:
    acme:
      email: ${LE_EMAIL:-admin@example.com}
      storage: /etc/traefik/acme/acme.json
      httpChallenge:
        entryPoint: http
      certificatesDuration: 2160h

  letsencrypt-staging:
    acme:
      email: ${LE_EMAIL:-admin@example.com}
      storage: /etc/traefik/acme/acme-staging.json
      caServer: "https://acme-staging-v02.api.letsencrypt.org/directory"
      httpChallenge:
        entryPoint: http

log:
  level: INFO
  filePath: /var/log/traefik/traefik.log

accessLog:
  filePath: /var/log/traefik/access.log
