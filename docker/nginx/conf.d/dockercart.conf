# DockerCart Nginx Configuration
# Acts as reverse proxy to Apache + serves static files with caching

server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;
    root /var/www/html;
    index index.php index.html;

    # Logging
    access_log /var/log/nginx/dockercart_access.log main;
    error_log /var/log/nginx/dockercart_error.log warn;

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;

    # NOTE: Rate limiting is NOT applied globally here.
    # It is applied only to PHP/dynamic locations below to avoid 503 errors
    # when a browser makes many simultaneous static-asset requests (Ctrl+F5).

    # Canonicalize URLs with duplicate slashes in path (e.g. ////electronics-1)
    # Use normalized $uri for target while preserving query string.
    if ($request_uri ~ "^([^?]*//+[^?]*)(\\?.*)?$") {
        return 301 $scheme://$host$uri$is_args$args;
    }

    # ======================
    # STATIC FILES (cached)
    # ======================

    # Images - cache 30 days
    location ~* \.(jpg|jpeg|png|gif|ico|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # CSS, JS - cache 30 days
    location ~* \.(css|js)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Fonts - cache 90 days
    location ~* \.(woff|woff2|ttf|otf|eot)$ {
        expires 90d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Media - cache 7 days
    location ~* \.(mp4|webm|ogg)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # ======================
    # DENY SENSITIVE PATHS
    # ======================

    location ~ /\. {
        deny all;
        access_log off;
    }

    location ~ /config/ {
        deny all;
    }

    location ~ /storage/ {
        deny all;
    }

    location ~ /system/ {
        deny all;
    }

    # ======================
    # PROXY TO APACHE
    # ======================

    # PHP requests -> Apache (rate-limited: dynamic content)
    location ~ \.php$ {
        limit_req zone=general burst=20 nodelay;

        proxy_pass http://apache;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $server_name;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Dynamic requests -> Apache
    location ~* \.(html|htm)$ {
        proxy_pass http://apache;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # Cache HTML for 1 minute
        proxy_cache static_cache;
        proxy_cache_valid 200 1m;
        proxy_cache_key "$scheme$request_method$host$request_uri";
    }

    # Default: proxy to Apache (rate-limited: catches all remaining dynamic requests)
    location / {
        limit_req zone=general burst=20 nodelay;

        proxy_pass http://apache;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 24 4k;
    }

    # ======================
    # HEALTH CHECK
    # ======================

    location /health {
        access_log off;
        return 200 "healthy\n";
        add_header Content-Type text/plain;
    }
}
