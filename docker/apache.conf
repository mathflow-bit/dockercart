# HTTP на HTTPS редирект (отключено если за Traefik)
<VirtualHost *:80>
    ServerAdmin admin@localhost
    DocumentRoot /var/www/html
    
    <Directory /var/www/html>
        Options Indexes FollowSymLinks
        AllowOverride All
        Require all granted
        
        # Защита от директории traversal
        Options -Indexes
        
        # Rеwrite rules
        <IfModule mod_rewrite.c>
            RewriteEngine On
            RewriteBase /
            RewriteRule ^sitemap.xml$ index.php?route=extension/feed/google_sitemap [L]
            RewriteRule ^googlebase.xml$ index.php?route=extension/feed/google_base [L]
            RewriteRule ^install(/.*)?$ index.php?route=error/not_found [L]
            RewriteRule ^system/storage/(.*) index.php?route=error/not_found [L]
            RewriteCond %{REQUEST_FILENAME} !-f
            RewriteCond %{REQUEST_FILENAME} !-d
            RewriteCond %{REQUEST_URI} !.*\.(ico|gif|jpg|jpeg|png|js|css)
            RewriteRule ^([^?]*) index.php?_route_=$1 [L,QSA]
        </IfModule>
    </Directory>

    # Защита системных директорий
    <Directory /var/www/html/system>
        Require all denied
    </Directory>

    <Directory /var/www/html/storage>
        Require all denied
    </Directory>

    # Логи
    ErrorLog ${APACHE_LOG_DIR}/dockercart_error.log
    CustomLog ${APACHE_LOG_DIR}/dockercart_access.log combined

    # Security headers
    <IfModule mod_headers.c>
        Header set X-Content-Type-Options "nosniff"
        Header set X-Frame-Options "SAMEORIGIN"
        Header set X-XSS-Protection "1; mode=block"
        Header set X-UA-Compatible "IE=edge"
        Header set Referrer-Policy "strict-origin-when-cross-origin"
    </IfModule>

    # Сжатие
    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/plain text/xml text/css text/javascript application/javascript application/json
    </IfModule>

    # Кэширование статических файлов
    <IfModule mod_expires.c>
        ExpiresActive On
        ExpiresByType image/jpg "access plus 1 year"
        ExpiresByType image/jpeg "access plus 1 year"
        ExpiresByType image/gif "access plus 1 year"
        ExpiresByType image/png "access plus 1 year"
        ExpiresByType image/svg+xml "access plus 1 year"
        ExpiresByType text/css "access plus 1 month"
        ExpiresByType application/javascript "access plus 1 month"
        ExpiresByType image/x-icon "access plus 1 year"
    </IfModule>
</VirtualHost>
