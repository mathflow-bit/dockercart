#############################################################################
# Manticore Search Configuration for DockerCart
# Version: 15.x
# Updated: 2026-01-23
#############################################################################

# Searchd daemon settings
searchd {
    listen = 9306:mysql41
    listen = 9308:http
    
    # PID file (required in v15)
    pid_file = /var/run/manticore/searchd.pid
    
    # Log settings
    log = /var/log/manticore/searchd.log
    query_log = /var/log/manticore/query.log
    
    # Performance settings
    network_timeout = 5
    
    # Binlog for RT indexes (data persistence)
    binlog_path = /var/lib/manticore/data
    
    # Worker threads
    threads = 4
}

#############################################################################
# Real-time indexes for DockerCart entities
#############################################################################

# Products index (multi-language support via language_id field)
table products {
    type = rt
    path = /var/lib/manticore/products
    
    # RT fields (stored and indexed)
    rt_field = title
    rt_field = description
    rt_field = meta_title
    rt_field = meta_description
    rt_field = meta_keywords
    rt_field = tags
    rt_field = model
    rt_field = sku
    rt_field = upc
    rt_field = ean
    rt_field = jan
    rt_field = isbn
    rt_field = mpn
    
    # Attributes (for filtering and sorting)
    rt_attr_uint = store_id
    rt_attr_uint = language_id
    rt_attr_uint = category_id
    rt_attr_uint = manufacturer_id
    rt_attr_uint = status
    rt_attr_uint = quantity
    rt_attr_float = price
    rt_attr_float = special
    rt_attr_timestamp = date_added
    rt_attr_timestamp = date_modified
    rt_attr_string = image
    rt_attr_string = model
    rt_attr_string = sku
    rt_attr_string = upc
    rt_attr_string = ean
    rt_attr_string = jan
    rt_attr_string = isbn
    rt_attr_string = mpn
    
    # Morphology: English stemmer, Russian lemmatizer
    morphology = stem_en, lemmatize_ru
    
    # Minimum infix length for wildcard searches
    min_infix_len = 2
    
    # Character set (Cyrillic + Latin)
    charset_table = 0..9, A..Z->a..z, _, a..z, \
        U+410..U+42F->U+430..U+44F, U+430..U+44F, U+401->U+451, U+451
    
    # HTML stripping
    html_strip = 1
}

# Categories index
table categories {
    type = rt
    path = /var/lib/manticore/categories
    
    rt_field = name
    rt_field = description
    rt_field = meta_title
    rt_field = meta_description
    rt_field = meta_keywords
    
    rt_attr_uint = store_id
    rt_attr_uint = language_id
    rt_attr_uint = parent_id
    rt_attr_uint = status
    rt_attr_uint = sort_order
    rt_attr_string = image
    
    morphology = stem_en, lemmatize_ru
    min_infix_len = 2
    charset_table = 0..9, A..Z->a..z, _, a..z, \
        U+410..U+42F->U+430..U+44F, U+430..U+44F, U+401->U+451, U+451
    html_strip = 1
}

# Manufacturers index
table manufacturers {
    type = rt
    path = /var/lib/manticore/manufacturers
    
    rt_field = name
    
    rt_attr_uint = store_id
    rt_attr_uint = status
    rt_attr_uint = sort_order
    rt_attr_string = image
    
    morphology = stem_en, lemmatize_ru
    min_infix_len = 2
    charset_table = 0..9, A..Z->a..z, _, a..z, \
        U+410..U+42F->U+430..U+44F, U+430..U+44F, U+401->U+451, U+451
}

# Information pages index
table information {
    type = rt
    path = /var/lib/manticore/information
    
    rt_field = title
    rt_field = description
    rt_field = meta_title
    rt_field = meta_description
    rt_field = meta_keywords
    
    rt_attr_uint = store_id
    rt_attr_uint = language_id
    rt_attr_uint = status
    rt_attr_uint = sort_order
    rt_attr_timestamp = date_added
    rt_attr_timestamp = date_modified
    
    morphology = stem_en, lemmatize_ru
    min_infix_len = 2
    charset_table = 0..9, A..Z->a..z, _, a..z, \
        U+410..U+42F->U+430..U+44F, U+430..U+44F, U+401->U+451, U+451
    html_strip = 1
}
