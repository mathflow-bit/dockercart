name: Lint

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  syntax:
    name: PHP Syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'

      - name: Lint
        run: |
          find upload -type f -name "*.php" ! -path 'upload/system/storage/vendor/*' -print0 \
            | xargs -0 -P4 php -l -n

  phpstan:
    name: PHPStan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2
          extensions: mbstring

      - name: Cache Composer & PHPStan
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/composer/files
            ./.cache
          key: phpstan-${{ hashFiles('**/composer.lock') }}
          restore-keys: phpstan-

      - name: Install PHPStan
        run: |
          composer require --dev --no-interaction phpstan/phpstan:2.1.51
          composer dump-autoload

      - name: Run PHPStan
        run: ./upload/system/storage/vendor/bin/phpstan analyze -a ./upload/system/storage/vendor/autoload.php --no-progress

  cs-fixer:
    name: Code Style
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2, cs2pr
          extensions: mbstring

      - name: Cache Composer & CS-Fixer
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/composer/files
            ./.php-cs-fixer.cache
          key: cs-fixer-${{ runner.os }}-${{ github.sha }}
          restore-keys: cs-fixer-${{ runner.os }}-

      - name: Install PHP-CS-Fixer
        run: composer require --dev --no-interaction -w friendsofphp/php-cs-fixer v3.95.1

      - name: Run PHP-CS-Fixer
        run: |
          ./upload/system/storage/vendor/bin/php-cs-fixer fix --dry-run --diff --format=checkstyle > /tmp/cs-report.xml || true
          cs2pr /tmp/cs-report.xml
