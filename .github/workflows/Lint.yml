name: Lint

on:
  push:
    branches: [ main ]
  pull_request:
    types: [ opened, synchronize, reopened ]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # важно для git diff при анализе изменённых файлов

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4'
          tools: composer:v2, cs2pr
          extensions: mbstring, intl, gd, xml
          coverage: none

      - name: Get Composer Cache Directory
        id: composer-cache
        run: echo "dir=$(composer config cache-files-dir)" >> $GITHUB_OUTPUT

      - name: Cache Composer dependencies
        uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-composer-${{ hashFiles('**/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-

      - name: Install dependencies
        run: composer install --no-interaction --no-progress --prefer-dist --optimize-autoloader

      # ====================== Syntax check ======================
      - name: PHP Syntax Check
        run: |
          find upload -type f -name "*.php" ! -path "upload/system/storage/vendor/*" \
            -exec php -l -n {} \; 2>&1 | grep -v "No syntax errors detected" || true

      # ====================== PHPStan ======================
      - name: PHPStan
        run: |
          ./vendor/bin/phpstan analyze --no-progress --memory-limit=1G

      # ====================== PHP CS Fixer ======================
      - name: PHP CS Fixer (only changed files in PR)
        if: github.event_name == 'pull_request'
        run: |
          git fetch origin main --depth=1
          CHANGED_FILES=$(git diff --name-only origin/main -- '*.php' | grep -E '^upload/' | grep -v '/vendor/' || true)
          
          if [ -z "$CHANGED_FILES" ]; then
            echo "No PHP files changed."
            exit 0
          fi
          
          echo "$CHANGED_FILES" | xargs ./vendor/bin/php-cs-fixer fix \
            --config=.php-cs-fixer.php \
            --using-cache=yes \
            --cache-file=.php-cs-fixer.cache \
            --dry-run \
            --diff \
            --ansi || true
          
          # Для отображения ошибок в PR (Annotations)
          echo "$CHANGED_FILES" | xargs ./vendor/bin/php-cs-fixer fix \
            --config=.php-cs-fixer.php \
            --using-cache=yes \
            --cache-file=.php-cs-fixer.cache \
            --dry-run \
            --format=checkstyle | cs2pr

      - name: PHP CS Fixer (full check on push to main)
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          ./vendor/bin/php-cs-fixer fix \
            --config=.php-cs-fixer.php \
            --using-cache=yes \
            --cache-file=.php-cs-fixer.cache \
            --dry-run \
            --diff \
            --ansi | cs2pr