# DockerCart - Standalone mode (no Traefik required)
# Use this file when you do NOT have Traefik running.
# The store is served on port 80 (HTTP) via Nginx proxy.
#
# Usage:
#   docker compose -f docker-compose.standalone.yml up -d
#   make standalone
#
# Store URL: http://dockercart.local

services:
  nginx:
    image: nginx:alpine
    container_name: ${NGINX_CONTAINER_NAME:-dockercart_nginx}
    restart: ${RESTART_POLICY:-unless-stopped}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    ports:
      - "${DOCKERCART_HTTP_PORT:-80}:80"
    volumes:
      - ./upload:/var/www/html:ro
      - ./storage:/var/www/storage:ro
      - ${LETSENCRYPT_WEBROOT_DIR:-./docker/letsencrypt/www}:/var/www/certbot
      - ./docker/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./docker/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./docker/nginx/cache:/var/cache/nginx:z
    depends_on:
      - apache
    networks:
      - dockercart-network
    healthcheck:
      test:
        ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/"]
      interval: 10s
      timeout: 5s
      retries: 3

  apache:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ${APACHE_CONTAINER_NAME:-dockercart_apache}
    restart: ${RESTART_POLICY:-unless-stopped}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    # No ports exposed - Nginx handles external connections
    volumes:
      - ./upload:/var/www/html:z
      - ./storage:/var/www/storage:z
      - ./VERSION:/var/www/VERSION:ro,z
      - ./docker/mysql/init.sql:/opt/dockercart-seed/init.sql:ro,z

    environment:
      - DB_HOSTNAME=${DB_HOSTNAME:-mariadb}
      - DB_USERNAME=${DB_USERNAME:-dockercart}
      - DB_PASSWORD=${DB_PASSWORD:-dockercart_password}
      - DB_DATABASE=${DB_DATABASE:-dockercart}
      - DB_PORT=${DB_PORT:-3306}
      - DB_PREFIX=${DB_PREFIX:-oc_}
      - DOCKERCART_URL=${DOCKERCART_URL:-http://dockercart.local}
      - DOCKERCART_HTTPS_URL=${DOCKERCART_HTTPS_URL:-http://dockercart.local}
      - DOCKERCART_SSL_ENABLED=${DOCKERCART_SSL_ENABLED:-false}
      - DOCKERCART_DOMAIN=${DOCKERCART_DOMAIN:-dockercart.local}
      - DOCKERCART_CUSTOM_ORDERS_XML_SECRET=${DOCKERCART_CUSTOM_ORDERS_XML_SECRET:-}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@example.com}
      - CACHE_HOSTNAME=${CACHE_HOSTNAME:-memcached}
      - CACHE_PORT=${CACHE_PORT:-11211}
      - CACHE_PREFIX=${CACHE_PREFIX:-oc_}
      - TZ=${TZ:-UTC}
      - PHP_MEMORY_LIMIT=${PHP_MEMORY_LIMIT:-256M}
      - PHP_UPLOAD_MAX_FILESIZE=${PHP_UPLOAD_MAX_FILESIZE:-100M}
      - PHP_POST_MAX_SIZE=${PHP_POST_MAX_SIZE:-100M}
      - PHP_MAX_EXECUTION_TIME=${PHP_MAX_EXECUTION_TIME:-300}
    depends_on:
      mariadb:
        condition: service_healthy
      memcached:
        condition: service_started
    networks:
      - dockercart-network

  mariadb:
    image: mariadb:11.8
    container_name: ${MARIADB_CONTAINER_NAME:-dockercart_mariadb}
    restart: ${RESTART_POLICY:-unless-stopped}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:-root_password}
      MARIADB_DATABASE: ${MARIADB_DATABASE:-dockercart}
      MARIADB_USER: ${MARIADB_USER:-dockercart}
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:-dockercart_password}
      DB_PREFIX: ${DB_PREFIX:-oc_}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
      DOCKERCART_URL: ${DOCKERCART_URL:-http://dockercart.local}
      TZ: ${TZ:-UTC}
    volumes:
      - mariadb-data:/var/lib/mysql
      - ./docker/mysql/init.sh:/docker-entrypoint-initdb.d/10-init.sh:z
      - ./docker/mysql/init.sql:/opt/dockercart-seed/init.sql:ro
    command: --character-set-server=utf8mb4 --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test:
        [
          "CMD",
          "mariadb-admin",
          "ping",
          "-h",
          "localhost",
          "-u",
          "${MARIADB_USER:-dockercart}",
          "-p${MARIADB_PASSWORD:-dockercart_password}",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - dockercart-network

  manticore:
    image: manticoresearch/manticore:15.1.0
    container_name: ${MANTICORE_CONTAINER_NAME:-dockercart_manticore}
    restart: ${RESTART_POLICY:-unless-stopped}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    environment:
      - TZ=${TZ:-UTC}
    volumes:
      - ./docker/manticore/manticore.conf:/etc/manticoresearch/manticore.conf:ro,z
      - ./docker/manticore/entrypoint.sh:/usr/local/bin/docker-entrypoint.sh:z
    tmpfs:
      - /var/lib/manticore:mode=0755,size=256M
    command:
      ["searchd", "-c", "/etc/manticoresearch/manticore.conf", "--nodetach"]
    networks:
      - dockercart-network
    healthcheck:
      test:
        ["CMD", "mysql", "-h", "127.0.0.1", "-P", "9306", "-e", "SHOW TABLES"]
      interval: 10s
      timeout: 5s
      retries: 5

  memcached:
    image: memcached:1.6-alpine
    container_name: ${MEMCACHED_CONTAINER_NAME:-dockercart_memcached}
    restart: ${RESTART_POLICY:-unless-stopped}
    command: ["memcached", "-m", "128", "-p", "11211", "-u", "memcache"]
    logging:
      driver: "none"
    networks:
      - dockercart-network
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "echo stats | nc 127.0.0.1 11211 >/dev/null 2>&1 || exit 1",
        ]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  mariadb-data:

networks:
  dockercart-network:
    name: ${DOCKERCART_NETWORK:-dockercart-network}
    driver: bridge
